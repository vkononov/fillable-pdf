name: Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} / Java ${{ matrix.java }}
    strategy:
      fail-fast: false
      matrix:
        ruby: [ '4.0', '3.4', '3.3', '3.2', '3.1', '3.0', '2.7', '2.6', '2.5', '2.4' ]
        java: [ '8', '11', '17', '21', '23', '25', '26' ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: java-${{ matrix.java }}
      - name: Install dependencies
        run: bundle install && bundle exec appraisal install
      - name: Run tests
        run: bundle exec appraisal rake test

  # Single stable status check that summarises the whole matrix above, so
  # branch protection can require one name ("Test") instead of every cell.
  test-result:
    name: Test
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job did not succeed
        if: needs.test.result != 'success'
        run: exit 1
